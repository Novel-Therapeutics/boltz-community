name: Benchmark

on:
  workflow_dispatch:
    inputs:
      note:
        description: 'Optional note (e.g. "baseline before perf optimizations")'
        required: false
        default: ''

jobs:
  benchmark:
    name: Performance benchmark
    runs-on: gpu-t4
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[test]"

      - name: Cache model checkpoints
        uses: actions/cache@v4
        with:
          path: ~/.boltz
          key: boltz-checkpoints-v1

      - name: Run benchmark
        run: python tests/benchmark.py --out benchmark-results.json

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark-results.json

      - name: Post summary
        if: always()
        run: |
          echo "## Benchmark Results" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ github.event.inputs.note }}" ]; then
            echo "**Note:** ${{ github.event.inputs.note }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat benchmark-results.json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
